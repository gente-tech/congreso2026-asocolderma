enterprise_integrations.settings:
  path: '/admin/config/system/enterprise-integrations/mandrill'
  defaults:
    _form: '\Drupal\enterprise_integrations\Form\MandrillSettingsForm'
    _title: 'Mandrill Settings'
  requirements:
    _permission: 'administer site configuration'

enterprise_integrations.hubspot_settings:
  path: '/admin/config/integrations/hubspot'
  defaults:
    _form: '\Drupal\enterprise_integrations\Form\HubspotSettingsForm'
    _title: 'HubSpot Settings'
  requirements:
    _permission: 'administer site configuration'