enterprise_integrations.settings:
  type: config_object
  label: 'Enterprise Integrations settings'
  mapping:
    mandrill:
      type: mapping
      label: 'Mandrill settings'
      mapping:
        api_key:
          type: string
          label: 'API Key'
        from_email:
          type: string
          label: 'From Email'
        from_name:
          type: string
          label: 'From Name'
        default_subject:
          type: string
          label: 'Default Subject'
        default_html_template:
          type: text
          label: 'Default HTML Template'